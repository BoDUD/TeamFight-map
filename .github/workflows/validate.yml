name: Validate map specification

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate map data
        run: python tools/validate_map_design.py

      - name: Rebuild graybox previews
        run: python tools/build_graybox_map.py

      - name: Ensure graybox previews are committed
        run: git diff --exit-code -- assets/graybox

      - name: Rebuild runtime spike assets
        run: python tools/build_runtime_spike_assets.py

      - name: Ensure runtime spike assets are committed
        run: git diff --exit-code -- mods/tfm2_lol_map_spike/aseprite_resources/ingame/5v5

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Compile install script
        run: python -m py_compile tools/install_runtime_spike_mod.py

      - name: Compile map_setting round-trip tool
        run: python -m py_compile tools/map_setting_round_trip.py

      - name: Compile map_setting inspect tool
        run: python -m py_compile tools/map_setting_inspect.py

      - name: Compile map_setting semantic validation tool
        run: python -m py_compile tools/map_setting_validate_semantics.py

      - name: Compile runtime anchor audit tools
        run: |
          python -m py_compile tools/audit_runtime_node_anchor_api.py
          python -m py_compile tools/install_runtime_anchor_probe.py
          python -m py_compile tools/bundle_utils.py
          python -m py_compile tools/audit_bundle_map_assets.py
          python -m py_compile tools/scan_setting_anchor_candidates.py
          python -m py_compile tools/derive_map_setting_path_graph.py
          python -m py_compile tools/map_setting_mutate_symmetric_edge.py
          python -m py_compile tools/install_runtime_mutation_probe.py
          python -m py_compile tools/select_q2f_semantic_probe_candidates.py
          python -m py_compile tools/map_setting_mutate_q2g_second_candidate.py
          python -m py_compile tools/install_runtime_q2g_probe.py
          python -m py_compile tools/analyze_chunked_binary_probe_targets.py
          python -m py_compile tools/analyze_packed4_next_hop_semantics.py
          python -m py_compile tools/analyze_packed4_code15_contexts.py
          python -m py_compile tools/analyze_code15_component_graph.py
          python -m py_compile tools/analyze_no15_singleton_components.py
          python -m py_compile tools/analyze_packed4_1_node_profiles.py
          python -m py_compile tools/correlate_map_setting_masks_with_visuals.py
