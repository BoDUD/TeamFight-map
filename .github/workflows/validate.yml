name: Validate map specification

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate map data
        run: python tools/validate_map_design.py

      - name: Rebuild graybox previews
        run: python tools/build_graybox_map.py

      - name: Run tests
        run: python -m unittest discover -s tests
